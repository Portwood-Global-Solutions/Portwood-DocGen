<template>
    <lightning-card title="Package Install Tracker" icon-name="standard:dashboard">
        <div slot="actions">
            <lightning-button label="Sync &amp; Create Accounts" variant="brand" onclick={handleSyncNow} class="slds-var-m-right_small"></lightning-button>
            <lightning-button label={versionToggleLabel} variant="neutral" onclick={handleToggleVersions} class="slds-var-m-right_small"></lightning-button>
            <lightning-button-icon icon-name="utility:refresh" alternative-text="Refresh" onclick={handleRefresh}></lightning-button-icon>
        </div>

        <div class="slds-p-horizontal_medium slds-p-bottom_medium">
            <!-- Package Filter -->
            <div class="slds-m-bottom_medium">
                <lightning-combobox
                    label="Package"
                    value={selectedPackageId}
                    options={packageOptions}
                    onchange={handlePackageChange}
                    variant="label-hidden"
                    placeholder="Select a package">
                </lightning-combobox>
            </div>

            <!-- Stats Cards -->
            <div class="slds-grid slds-gutters slds-m-bottom_medium">
                <div class="slds-col slds-size_1-of-5">
                    <div class="slds-box slds-box_small slds-text-align_center">
                        <p class="slds-text-title_caps slds-text-color_weak">Total</p>
                        <p class="slds-text-heading_large">{totalInstalls}</p>
                    </div>
                </div>
                <div class="slds-col slds-size_1-of-5">
                    <div class="slds-box slds-box_small slds-text-align_center">
                        <p class="slds-text-title_caps slds-text-color_weak">Active</p>
                        <p class="slds-text-heading_large slds-text-color_success">{activeInstalls}</p>
                    </div>
                </div>
                <div class="slds-col slds-size_1-of-5">
                    <div class="slds-box slds-box_small slds-text-align_center">
                        <p class="slds-text-title_caps slds-text-color_weak">Production</p>
                        <p class="slds-text-heading_large">{productionInstalls}</p>
                    </div>
                </div>
                <div class="slds-col slds-size_1-of-5">
                    <div class="slds-box slds-box_small slds-text-align_center">
                        <p class="slds-text-title_caps slds-text-color_weak">Sandbox</p>
                        <p class="slds-text-heading_large">{sandboxInstalls}</p>
                    </div>
                </div>
                <div class="slds-col slds-size_1-of-5">
                    <div class="slds-box slds-box_small slds-text-align_center">
                        <p class="slds-text-title_caps slds-text-color_weak">Uninstalled</p>
                        <p class="slds-text-heading_large slds-text-color_weak">{uninstalled}</p>
                    </div>
                </div>
            </div>

            <!-- Version History (collapsible) -->
            <template if:true={showVersions}>
                <div class="slds-box slds-m-bottom_medium" style="border-radius: 8px;">
                    <h3 class="slds-text-heading_small slds-m-bottom_small">Version History</h3>
                    <template if:true={hasVersions}>
                        <lightning-datatable
                            key-field="id"
                            data={versions}
                            columns={versionColumns}
                            hide-checkbox-column>
                        </lightning-datatable>
                    </template>
                    <template if:false={hasVersions}>
                        <p class="slds-text-color_weak">No versions found.</p>
                    </template>
                </div>
            </template>

            <!-- Subscriber Table -->
            <template if:true={isLoading}>
                <lightning-spinner alternative-text="Loading" size="medium"></lightning-spinner>
            </template>

            <template if:true={hasSubscribers}>
                <lightning-datatable
                    key-field="id"
                    data={subscribers}
                    columns={columns}
                    sorted-by={sortBy}
                    sorted-direction={sortDirection}
                    onsort={handleSort}
                    onrowaction={handleRowAction}
                    hide-checkbox-column>
                </lightning-datatable>
            </template>

            <template if:false={hasSubscribers}>
                <template if:false={isLoading}>
                    <div class="slds-illustration slds-illustration_small slds-p-vertical_large slds-text-align_center">
                        <p class="slds-text-color_weak slds-text-body_regular">No installs yet. Share your install link to get started.</p>
                    </div>
                </template>
            </template>

            <p class="slds-text-body_small slds-text-color_weak slds-m-top_medium slds-text-align_center">Auto-refreshes every 60 seconds. Only net-new installs trigger a notification. Accounts sync every 6 hours or on demand.</p>
        </div>
    </lightning-card>

    <!-- Link to Account Modal -->
    <template if:true={showLinkModal}>
        <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open">
            <div class="slds-modal__container" style="max-width: 480px;">
                <header class="slds-modal__header">
                    <lightning-button-icon icon-name="utility:close" alternative-text="Close" variant="bare" class="slds-button slds-button_icon slds-modal__close" onclick={handleCloseLinkModal}></lightning-button-icon>
                    <h2 class="slds-text-heading_medium">Link to Account</h2>
                    <p class="slds-text-body_small slds-text-color_weak slds-m-top_x-small">Link <strong>{linkOrgName}</strong> to an existing Account.</p>
                </header>
                <div class="slds-modal__content slds-p-around_medium">
                    <lightning-input type="search" label="Search Accounts" placeholder="Type account name..." value={accountSearchTerm} onchange={handleAccountSearch}></lightning-input>
                    <template if:true={accountSearchResults.length}>
                        <div class="slds-dropdown slds-dropdown_fluid" style="position: relative; z-index: 100;">
                            <ul class="slds-listbox slds-listbox_vertical">
                                <template for:each={accountSearchResults} for:item="acct">
                                    <li key={acct.Id} class="slds-listbox__item">
                                        <div class="slds-media slds-listbox__option slds-listbox__option_plain slds-media_small" data-id={acct.Id} data-name={acct.Name} onclick={handleSelectAccount} style="cursor: pointer; padding: 0.5rem;">
                                            <span class="slds-truncate">{acct.Name}</span>
                                        </div>
                                    </li>
                                </template>
                            </ul>
                        </div>
                    </template>
                </div>
                <footer class="slds-modal__footer">
                    <lightning-button label="Cancel" onclick={handleCloseLinkModal}></lightning-button>
                    <lightning-button label="Link Account" variant="brand" onclick={handleLinkAccount} disabled={linkDisabled} class="slds-m-left_x-small"></lightning-button>
                </footer>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>
</template>
